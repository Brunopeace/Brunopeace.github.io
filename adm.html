<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel de Gestão - Master</title>
    <link rel="icon" href="img/icon512.png">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    
    <style>
        body {
            background: #121212;
            color: white;
            font-family: sans-serif;
            padding: 20px;
         }
         
        h1 {
            color: #25d366;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
         }
         
        .grid-usuarios {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 10px;
         }
         
        .card-user {
            background: #1e1e1e;
            border: 1px solid #333;
            padding: 20px;
            border-radius: 15px;
            transition: 0.3s;
            width: 100%;
            box-sizing: border-box;
         }
         
        .card-user:hover {
            border-color: #25d366;
         }
         
        /* Container de Status corrigido com espaçamento automático */
        .status-container {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
         }
         
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 5px;
         }
         
        .online {
            background: #25d366;
            box-shadow: 0 0 10px #25d366;
         }
         
        .offline {
            background: #ff4b4b;
         }

        /* Balão do Nome do Usuário ajustado e com espaçamento interno */
        .user-name-display {
            font-size: 0.95rem;
            color: #ffffff;
            font-weight: bold;
            background: #292929;
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid #444;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-left: auto;
        }
         
        .info {
            font-size: 0.9rem;
            line-height: 1.6;
            color: #ccc;
         }
         
         .vitalicio-name {
             color: #25d366;
         }
         
        .badge-id {
            background: #25d366;
            color: #000000;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: bold;
         }
         
        .vencimento-info {
            color: #ff9800;
            font-weight: bold;
            display: block;
            margin: 5px 0;
         }
        
        .admin-actions {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #333;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
         }
         
        .input-text {
            background: #121212;
            border: 1px solid #444;
            color: white;
            padding: 8px;
            border-radius: 6px;
            outline: none;
            min-width: 180px;
            flex: 1;
        }

        .input-text:focus, .input-data:focus {
            border-color: #25d366;
        }

        .input-data {
            background: #121212;
            border: 1px solid #444;
            color: white;
            padding: 8px;
            border-radius: 6px;
            outline: none;
         }
            
        .btn-salvar {
            background: #25d366;
            border: none;
            color: black;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
         }
        
        .btn-excluir { 
            background: #ff4b4b;
            border: none;
            color: white;
            padding: 8px 16px; 
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin-left: auto;
        }
        
        .btn-excluir:hover {
            background: #cc3a3a;
        }

        /* Ajuste fino para o layout não quebrar em telas de celular */
        @media (max-width: 480px) {
            .user-name-display {
                margin-left: 0;
                width: 100%;
                text-align: center;
                margin-top: 5px;
            }
        }
    </style>
</head>
<body>

    <h1>Gestão de Usuários</h1>
    <div id="gridUsuarios" class="grid-usuarios">Buscando usuários...</div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCw38sezt3TWmFIuUXFD3mPAj2ZPF6ZD4o",
            authDomain: "gerenciador-eeb96.firebaseapp.com",
            databaseURL: "https://gerenciador-eeb96-default-rtdb.firebaseio.com",
            projectId: "gerenciador-eeb96",
            storageBucket: "gerenciador-eeb96.appspot.com",
            messagingSenderId: "560345055072",
            appId: "1:560345055072:web:9048475b7ac90a7f43e805"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function listarUsuarios() {
            const grid = document.getElementById('gridUsuarios');
            db.ref('usuarios').on('value', (snapshot) => {
                if (!snapshot.exists()) {
                    grid.innerHTML = "Nenhum usuário encontrado.";
                    return;
                }
                grid.innerHTML = "";
                const usuarios = snapshot.val();
                const agora = Date.now();

                for (let tel in usuarios) {
                    const user = usuarios[tel];
                    
                    // Lógica de Online/Offline (45 segundos)
                    const isOnline = user.lastSeen && (agora - user.lastSeen < 45000);
                    
                    // Captura o nome atual salvo no nó do usuário
                    const nomeAtual = user.nome || "";
                    
                    // Formatação do Último Acesso
                    const dataUltimoAcesso = user.lastSeen 
                        ? new Date(user.lastSeen).toLocaleString('pt-BR') 
                        : "Nunca";
                        
                    const dataExpira = user.dataExpiracao || ""; 

                    const card = document.createElement('div');
                    card.className = 'card-user';
                    card.innerHTML = `
                        <div class="status-container">
                            <span class="status-dot ${isOnline ? 'online' : 'offline'}"></span>
                            <strong>${isOnline ? 'USUÁRIO ATIVO' : 'DESCONECTADO'}</strong>
                            <span class="user-name-display">👤 ${nomeAtual || 'Sem Identificação'}</span>
                        </div>
                        <div class="info">
                            ID: <span class="badge-id">${tel}</span> | 
                            Expira: <strong class="vitalicio-name">${dataExpira || 'Vitalício'}</strong><br>
                            <span style="color: #bf8300; font-size: 0.8rem;">
                                Último acesso: ${dataUltimoAcesso}
                            </span>
                        </div>
                        <div class="admin-actions">
                            <input type="text" id="nome-${tel}" class="input-text" placeholder="Nome do Usuário" value="${nomeAtual}">
                            
                            <input type="date" id="exp-${tel}" class="input-data" value="${dataExpira}">
                            <button class="btn-salvar" onclick="salvarDadosUsuario('${tel}')">Atualizar</button>
                            <button class="btn-excluir" onclick="excluirUsuario('${tel}')">Excluir Usuário</button>
                        </div>
                    `;
                    grid.appendChild(card);
                }
            });
        }

        // Salva tanto o Vencimento quanto o Nome digitado no Firebase
        function salvarDadosUsuario(tel) {
            const novoNome = document.getElementById(`nome-${tel}`).value.trim();
            const novaData = document.getElementById(`exp-${tel}`).value;
            
            db.ref('usuarios/' + tel).update({ 
                nome: novoNome,
                dataExpiracao: novaData 
            })
            .then(() => alert("✅ Dados salvos com sucesso!"));
        }

        function excluirUsuario(tel) {
            if (confirm(`🚨 PERIGO: Deseja apagar o usuário ${tel} e todos os clientes dele para sempre?`)) {
                db.ref('usuarios/' + tel).remove()
                .then(() => alert("🗑️ Usuário removido do Firebase!"));
            }
        }

        listarUsuarios();
    </script>
</body>
</html>
