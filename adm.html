<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel de Gestão - Master</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="img/icon512.png">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    
    <style>
        body {
            background: #121212;
            color: white;
            font-family: sans-serif;
            padding: 15px;
            margin: 0;
            box-sizing: border-box;
         }
         
        h1 {
            color: #25d366;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
            font-size: 1.5rem;
            margin-top: 10px;
         }
         
        .grid-usuarios {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
            max-height: 85vh;
            overflow-y: auto;
         }
         
        .card-user {
            background: #1e1e1e;
            border: 1px solid #333;
            padding: 20px;
            border-radius: 20px;
            transition: 0.3s;
            width: 100%;
            box-sizing: border-box;
         }
         
        .card-user:hover {
            border-color: #25d366;
         }
         
        /* Container de Status */
        .status-container {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            margin-bottom: 15px;
            gap: 12px;
         }

        .status-row {
            display: flex;
            align-items: center;
            font-size: 1rem;
            letter-spacing: 0.5px;
        }
         
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 10px;
         }
         
        .online {
            background: #25d366;
            box-shadow: 0 0 10px #25d366;
         }
         
        .offline {
            background: #ff4b4b;
         }

        /* Identificou com o visual exato da foto (Centralizado e Amarelo) */
        .user-name-display {
            font-size: 1rem;
            color: #fffb00;
            font-weight: bold;
            background: #292929;
            padding: 8px 15px;
            border-radius: 25px;
            border: 1px solid #3e3e3e;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            width: 100%;
            box-sizing: border-box;
            text-align: center;
        }
         
        .info {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #ccc;
            border-bottom: 1px solid #2d2d2d;
            padding-bottom: 15px;
            margin-bottom: 15px;
         }
         
        .vitalicio-name {
             color: #25d366;
         }
         
        .badge-id {
            background: #25d366;
            color: #000000;
            padding: 2px 8px;
            border-radius: 6px;
            font-weight: bold;
         }
        
        /* Ações administrativas organizadas para celular */
        .admin-actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
         }

        .inputs-row {
            display: flex;
            gap: 10px;
            width: 100%;
        }
         
        .input-text {
            background: #121212;
            border: 1px solid #444;
            color: white;
            padding: 12px;
            border-radius: 8px;
            outline: none;
            flex: 1;
            font-size: 0.95rem;
            width: 50%;
        }

        .input-data {
            background: #121212;
            border: 1px solid #444;
            color: white;
            padding: 12px;
            border-radius: 8px;
            outline: none;
            flex: 1;
            font-size: 0.95rem;
            width: 50%;
            color-scheme: dark; /* Deixa o calendário nativo escuro */
         }

        .input-text:focus, .input-data:focus {
            border-color: #25d366;
        }

        .buttons-row {
            display: flex;
            gap: 10px;
            width: 100%;
        }
            
        .btn-salvar {
            background: #25d366;
            border: none;
            color: black;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            flex: 1;
            font-size: 0.95rem;
         }
        
        .btn-excluir { 
            background: #ff4b4b;
            border: none;
            color: white;
            padding: 12px; 
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            flex: 1;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

    <h1>Gestão de Usuários</h1>
    <div id="gridUsuarios" class="grid-usuarios">Buscando usuários...</div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCw38sezt3TWmFIuUXFD3mPAj2ZPF6ZD4o",
            authDomain: "gerenciador-eeb96.firebaseapp.com",
            databaseURL: "https://gerenciador-eeb96-default-rtdb.firebaseio.com",
            projectId: "gerenciador-eeb96",
            storageBucket: "gerenciador-eeb96.appspot.com",
            messagingSenderId: "560345055072",
            appId: "1:560345055072:web:9048475b7ac90a7f43e805"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function listarUsuarios() {
            const grid = document.getElementById('gridUsuarios');
            db.ref('usuarios').on('value', (snapshot) => {
                if (!snapshot.exists()) {
                    grid.innerHTML = "Nenhum usuário encontrado.";
                    return;
                }
                grid.innerHTML = "";
                const usuarios = snapshot.val();
                const agora = Date.now();

                for (let tel in usuarios) {
                    const user = usuarios[tel];
                    
                    // Lógica de Online/Offline (45 segundos)
                    const isOnline = user.lastSeen && (agora - user.lastSeen < 45000);
                    
                    // Captura o nome atual salvo no nó do usuário
                    const nomeAtual = user.nome || "";
                    
                    // Formatação do Último Acesso
                    const dataUltimoAcesso = user.lastSeen 
                        ? new Date(user.lastSeen).toLocaleString('pt-BR') 
                        : "Nunca";
                        
                    const dataExpira = user.dataExpiracao || ""; 

                    const card = document.createElement('div');
                    card.className = 'card-user';
                    card.innerHTML = `
                        <div class="status-container">
                            <div class="status-row">
                                <span class="status-dot ${isOnline ? 'online' : 'offline'}"></span>
                                <strong>${isOnline ? 'USUÁRIO ATIVO' : 'OFF-LINE'}</strong>
                            </div>
                            <div class="user-name-display">${nomeAtual || 'Sem Identificação'}</div>
                        </div>
                        
                        <div class="info">
                            ID: <span class="badge-id">${tel}</span> | 
                            Expira: <strong class="vitalicio-name">${dataExpira || 'Vitalício'}</strong><br>
                            <span style="color: #bf8300; font-size: 0.8rem;">
                                Último acesso: ${dataUltimoAcesso}
                            </span>
                        </div>
                        
                        <div class="admin-actions">
                            <div class="inputs-row">
                                <input type="text" id="nome-${tel}" class="input-text" placeholder="Nome do Usuário" value="${nomeAtual}">
                                <input type="date" id="exp-${tel}" class="input-data" value="${dataExpira}">
                            </div>
                            
                            <div class="buttons-row">
                                <button class="btn-salvar" onclick="salvarDadosUsuario('${tel}')">Atualizar</button>
                                <button class="btn-excluir" onclick="excluirUsuario('${tel}')">Excluir Usuário</button>
                            </div>
                        </div>
                    `;
                    grid.appendChild(card);
                }
            });
        }

        // Salva o Vencimento e o Nome no Firebase
        function salvarDadosUsuario(tel) {
            const novoNome = document.getElementById(`nome-${tel}`).value.trim();
            const novaData = document.getElementById(`exp-${tel}`).value;
            
            db.ref('usuarios/' + tel).update({ 
                nome: novoNome,
                dataExpiracao: novaData 
            })
            .then(() => alert("✅ Dados salvos com sucesso!"));
        }

        function excluirUsuario(tel) {
            if (confirm(`🚨 PERIGO: Deseja apagar o usuário ${tel} e todos os clientes dele para sempre?`)) {
                db.ref('usuarios/' + tel).remove()
                .then(() => alert("🗑️ Usuário removido do Firebase!"));
            }
        }

        listarUsuarios();
    </script>
</body>
</html>
