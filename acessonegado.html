<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://image.winudf.com/v2/image1/Y29tLmpjYW5kcm9pZC51bmlvbmlwdHZicl9pY29uXzE1NDc3MTExMzdfMDE0/icon.png?w=184&fakeurl=1">
    <title>Acesso Negado | Gerenciador</title>
    <style>
        :root {
            --primary-color: #ff4b2b;
            --secondary-color: #ff416c;
            --bg-dark: #0f0f0f;
        }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 400px;
            width: 90%;
            animation: fadeIn 0.8s ease-out;
        }

        .logo {
            width: 120px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px rgba(255,75,43,0.3));
        }

        .icon-warning {
            font-size: 60px;
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        h1 {
            font-size: 24px;
            margin: 10px 0;
            letter-spacing: 2px;
            background: linear-gradient(to right, #ff4b2b, #ff416c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #888;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .btn-contato {
            display: inline-block;
            background: linear-gradient(to right, #ff4b2b, #ff416c);
            color: white;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: bold;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 10px 20px rgba(255, 75, 43, 0.2);
        }

        .btn-contato:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(255, 75, 43, 0.4);
        }

        footer {
            position: absolute;
            bottom: 20px;
            font-size: 12px;
            color: #444;
        }

        footer a {
            color: #666;
            text-decoration: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="img/logo-padrao.png" alt="Logo" class="logo">
        
        <div class="icon-warning">⚠️</div>
        <h1>ACESSO RESTRITO</h1>
        <p>Seu identificador não possui permissão para visualizar este gerenciador. Entre em contato com o suporte para liberação.</p>
        
        <a href="https://wa.me/5581982258462?text=*Olá, meu acesso ao gerenciador de clientes está negado. Gostaria de solicitar a liberação.*" class="btn-contato">
            Solicitar Acesso
        </a>
    </div>

    <footer>
        © 2026 Produzido por <a href="#"><strong>FRONT-END DEVELOPER</strong></a>
    </footer>

</body>
</html>
